spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/omnidocs
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  flyway:
    enabled: true

logging:
  level:
    org.springframework: INFO

storage:
  location: uploads