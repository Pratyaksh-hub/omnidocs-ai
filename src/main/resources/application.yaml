spring:
  application:
    name: omnidocs-ai

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

gemini:
  api-key: ${GEMINI_API_KEY}
  embedding-model: gemini-embedding-001
  chat-model: gemini-2.5-flash
  base-url: https://generativelanguage.googleapis.com

storage:
  upload-dir: ${UPLOAD_DIR:uploads}

logging:
  level:
    root: INFO

server:
  port: ${PORT:8080}


management:
  endpoints:
    web:
      exposure:
        include: health